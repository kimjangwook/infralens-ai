name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      # The Django test client speaks plain HTTP, so the prod SSL redirect would
      # turn every request into a 301. Disable it for the test run only.
      DJANGO_SECURE_SSL_REDIRECT: "false"
      # No OPENAI_API_KEY: keeps the data migration from seeding a provider,
      # so AI tests stay offline and deterministic.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: python manage.py test --verbosity 2
