services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_SECRET_KEY: "replace-this-before-real-use"
      INFRALENS_DB_PATH: "/data/db.sqlite3"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini-2026-03-17}"
    volumes:
      - infralens-data:/data

  scheduler:
    build: .
    command: python manage.py run_scheduler --loop
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_SECRET_KEY: "replace-this-before-real-use"
      INFRALENS_DB_PATH: "/data/db.sqlite3"
    volumes:
      - infralens-data:/data
    depends_on:
      - web

  worker:
    build: .
    command: python manage.py run_worker --loop
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_SECRET_KEY: "replace-this-before-real-use"
      INFRALENS_DB_PATH: "/data/db.sqlite3"
      INFRALENS_ASYNC_SCANS: "${INFRALENS_ASYNC_SCANS:-false}"
    volumes:
      - infralens-data:/data
    depends_on:
      - web

volumes:
  infralens-data:
