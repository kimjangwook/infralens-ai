{% extends "ops/base.html" %}
{% block title %}User access - InfraLens AI{% endblock %}
{% block content %}
  <section class="narrow">
    <div class="panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Infrastructure access</p>
          <h1>{{ user_obj.username }}</h1>
        </div>
      </div>
      <form class="stack-form" method="post">
        {% csrf_token %}
        {% if form.fields %}
          {% for field in form %}
            <label class="field">
              <span>{{ field.label }}</span>
              {{ field }}
              {% for error in field.errors %}<small class="error">{{ error }}</small>{% endfor %}
            </label>
          {% endfor %}
        {% else %}
          <div class="empty-state"><strong>No cloud accounts yet.</strong></div>
        {% endif %}
        <div class="form-actions">
          <button class="button primary" type="submit">Save access</button>
          <a class="button secondary" href="{% url 'users' %}">Back</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
